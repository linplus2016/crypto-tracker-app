version: '3.8'

services:
  backend:
    build: ./backend
    container_name: crypto-backend
    restart: unless-stopped
    volumes:
      - ./backend/cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: crypto-frontend
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks:
      - crypto-network

networks:
  crypto-network:
    driver: bridge
